name: Export CSV and Santa Draw

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Подтверждение запуска жеребьевки. Выберите Финальный этап этап.'
        required: true
        type: choice
        default: 'no'
        options:
          - 'no'
          - '🛠️ In service'
          - '🎁 Results'
  workflow_call:
  
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "santa-draw"
  cancel-in-progress: false

jobs:
  fetch-and-draw:
    if: inputs.confirm != 'no'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Create _local directory
        run: mkdir -p _local

      - name: Build CSV URL from sheet ID
        env:
          CSV_SHEET_ID: ${{ secrets.CSV_SHEET_ID }}
        run: |
          if [ -z "$CSV_SHEET_ID" ]; then
            echo "❌ Ошибка: секрет CSV_SHEET_ID не настроен"
            echo "Добавьте его в Settings → Secrets and variables → Actions"
            echo "Пример: LEm11j1Ttbj.......0AJbjU"
            exit 1
          fi
          
          CSV_URL="https://docs.google.com/spreadsheets/d/${CSV_SHEET_ID}/export?format=csv"
          echo "CSV_URL=$CSV_URL" >> $GITHUB_ENV
          echo "✅ URL собран"

      - name: Download CSV from Google Sheets
        env:
          CSV_URL: ${{ env.CSV_URL }}
        run: |
          echo "📥 Загрузка CSV из: $CSV_URL"

          # Скачиваем файл с таймаутом 30 секунд
          HTTP_CODE=$(curl -L -o _local/SANTA.csv -w "%{http_code}" --max-time 30 "$CSV_URL")

          echo "📊 HTTP статус: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ ОШИБКА: Не удалось загрузить файл. HTTP статус: $HTTP_CODE"
            echo "Проверьте:"
            echo "- Доступна ли таблица по ссылке?"
            echo "- Правильно ли настроен секрет CSV_SHEET_ID?"
            exit 1
          fi

          # Проверяем, что файл загрузился и не пустой
          if [ ! -s _local/SANTA.csv ]; then
            echo "❌ Файл не загрузился или пуст"
            exit 1
          fi

          # Проверяем, что это действительно CSV
          if ! head -1 _local/SANTA.csv | grep -q ","; then
            echo "❌ Файл не похож на CSV"
            echo "📋 Содержимое файла:"
            cat _local/SANTA.csv
            exit 1
          fi

          echo "✅ Файл загружен"
          echo "📊 Количество строк: $(wc -l < _local/SANTA.csv)"
          echo "📋 Первая строка:"
          head -1 _local/SANTA.csv

      - name: Run Santa draw
        run: npm run santa

      - name: Verify addresses.ts was generated
        run: |
          if [ ! -s src/data/addresses.ts ]; then
            echo "❌ addresses.ts не сгенерирован"
            exit 1
          fi

      - name: Commit addresses.ts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/addresses.ts
          git diff --staged --quiet || git commit -m "chore: auto-draw results by csv export [skip ci]"
          git push || {
            echo "❌ Не удалось отправить изменения"
            exit 1
          }

  change-stage:
    needs: fetch-and-draw
    uses: ./.github/workflows/change-stage.yml
    with:
      stage: ${{ inputs.confirm }}  # set stage to 2 or 3

  upload-error-logs-on-failure:
    needs: fetch-and-draw
    uses: ./.github/workflows/upload-error-logs.yml
    with:
      artifact-name: auto-santa-error-logs
      log-path: |
        _local/SANTA.csv
        src/data/addresses.ts
