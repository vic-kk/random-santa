name: Change Stage

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Выберите этап'
        required: true
        default: '🛠️ In service'
        type: choice
        options:
          - '📝 Data collection'
          - '🛠️ In service'
          - '🎁 Results'
  workflow_call:
    inputs:
      stage:
        description: 'Этап для автоматической установки'
        required: false
        default: '🛠️ In service'
        type: string
      need-update:
        required: false
        type: boolean

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: "change-stage"
  cancel-in-progress: false

jobs:
  change-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Pull latest
        if: ${{ inputs.need-update }}
        run: git pull origin main

      # Manual staging
      - name: Set stage ${{ inputs.stage }} from manual trigger
        uses: ./.github/actions/change-stage
        with:
          stage: ${{ inputs.stage }}
      
  # Build up
  build-and-deploy:
    needs: change-stage
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      need-update: true

  # Collect logs
  upload-error-logs-on-failure:
    needs: change-stage
    uses: ./.github/workflows/upload-error-logs.yml
    with:
      artifact-name: change-stage-error-logs
      log-path: |
         src/features/features.ts
