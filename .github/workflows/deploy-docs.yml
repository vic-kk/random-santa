name: Build and Deploy

on:
  push:
    branches: [main]
    # 1. Автоматическая сборка при изменении features.ts
    paths:
      - 'src/features/features.ts'
    # 2. Сборка по тегу (для обновления интерфейса, компонентов и т.д.)
    tags:
      - 'v*'           # v1.0.0, v2.0.0 и т.д.
      - 'deploy'       # простой тег deploy
  
  # 3. Ручной запуск с выбором этапа (из интерфейса GitHub)
  workflow_dispatch:
    inputs:
      stage:
        description: 'Выберите этап (1 - Сбор / 2 - Сервис / 3 - Результаты)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      # Ручной запуск: меняем stage и коммитим
      - name: Set stage from manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Setting stage to: ${{ inputs.stage }}"
          npm run stage -- ${{ inputs.stage }}
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/features/features.ts
          git diff --staged --quiet || git commit -m "chore: set stage to ${{ inputs.stage }} [skip ci]"
          git push
      
      # Сборка проекта (для всех случаев)
      - name: Build project
        run: npm run build
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4