name: Scheduled triggers

on:
  schedule:
    # тестовый крон на сегодня, 22 апреля 2026, в 10:00 UTC
    - cron: '0 5 22 4 *'
    # 1 декабря в 00:00 UTC — change-state
    - cron: '0 0 1 12 *'
    # 15 декабря в 00:00 UTC — auto-santa
    - cron: '0 0 15 12 *'
    # 5 января в 00:00 UTC — change-state
    - cron: '0 0 5 1 *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Dispatch by schedule
        shell: bash
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          echo "Triggered by schedule: $SCHEDULE"

          if [ "$SCHEDULE" == "0 5 22 4 *" ]; then
            echo "→ Running change-state for 22 Apr (workflow_call)"
            gh workflow run change-state.yml -f stage="📝 Data collection"

          elif [ "$SCHEDULE" == "0 0 1 12 *" ]; then
            echo "→ Running change-state for 1 Dec (workflow_call)"
            gh workflow run change-state.yml -f stage="📝 Data collection"

          elif [ "$SCHEDULE" == "0 0 15 12 *" ]; then
            echo "→ Running auto-santa for 15 Dec (workflow_call)"
            gh workflow run auto-santa.yml -f confirm="🎁 Results"

          elif [ "$SCHEDULE" == "0 0 5 1 *" ]; then
            echo "→ Running change-state for 5 Jan (workflow_call)"
            gh workflow run change-state.yml -f stage="🛠️ In service"

          else
            echo "Unknown schedule: $SCHEDULE — skipping."
            exit 1
          fi