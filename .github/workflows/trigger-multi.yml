name: Scheduled triggers

on:
  schedule:
    # CRON_START - 1 декабря в 01:25 UTC — change-stage
    - cron: '25 1 1 12 *'
    # CRON_DRAW - 15 декабря в 01:25 UTC — auto-santa
    - cron: '25 1 15 12 *'
    # CRON_CLOSE - 5 января в 01:25 UTC — change-stage
    - cron: '25 1 5 1 *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  id-token: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0
  
      - name: Dispatch by schedule
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          CRON_START="25 1 1 12 *"
          CRON_DRAW="25 1 15 12 *"
          CRON_CLOSE="25 1 5 1 *"

          SCHEDULE="${{ github.event.schedule }}"
          echo "Triggered by schedule: $SCHEDULE"
          
          case "$SCHEDULE" in
            "$CRON_START")
              echo "→ Running change-stage for 1 Dec ($SCHEDULE)"
              gh workflow run change-stage.yml -f stage="📝 Data collection"
              ;;
            "$CRON_DRAW")
              echo "→ Running auto-santa for 15 Dec ($SCHEDULE)"
              gh workflow run auto-santa.yml -f confirm="🎁 Results"
              ;;
            "$CRON_CLOSE")
              echo "→ Running change-stage for 5 Jan ($SCHEDULE)"
              gh workflow run change-stage.yml -f stage="🛠️ In service"
              ;;
            *)
              echo "manual test schedule: CRON — skipping. ($SCHEDULE)"
              gh workflow run change-stage.yml -f stage="🛠️ In service"
              ;;
          esac